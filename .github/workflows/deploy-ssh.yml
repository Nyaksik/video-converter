name: Deploy to K3s
on:
  workflow_run:
    workflows: ["Build & Push Docker"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (GitOps)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /tmp
            rm -rf video-converter
            git clone https://${{ github.actor }}:${{ secrets.TOKEN }}@github.com/Nyaksik/video-converter.git
            cd video-converter/k8s
            kubectl apply -f .
