name: Deploy to K3s (SSH)
on:
  workflow_run:
    workflows: ["Build & Push Docker"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            kubectl set image deployment/astro-app astro=${{ github.event.head_commit.message }}
            kubectl rollout status deployment/astro-app
            kubectl get svc astro-service
