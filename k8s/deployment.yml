containers:
  - name: astro
    image: ghcr.io/nyaksik/video-converter:latest
    ports:
      - containerPort: 80
    volumeMounts:
      - name: nginx-config
        mountPath: /etc/nginx/conf.d/default.conf
        subPath: default.conf
volumes:
  - name: nginx-config
    configMap:
      name: astro-nginx
