apiVersion: apps/v1
kind: Deployment
metadata:
  name: astro-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: astro
  template:
    metadata:
      labels:
        app: astro
    spec:
      containers:
        - name: astro
          image: ghcr.io/nyaksik/video-converter:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: astro-service
spec:
  selector:
    app: astro
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
